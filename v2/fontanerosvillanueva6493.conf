<VirtualHost *:80>
	ServerAdmin admin@fontanerosvillanueva6493.org
	ServerName www.fontanerosvillanueva6493.org
	DocumentRoot /var/www/fontanerosvillanueva6493.org
	<Directory /var/www/fontanerosvillanueva6493.org>
		AllowOverride AuthConfig
		AuthType Basic
		AuthName "Acceso Restringido"
		AuthBasicProvider file
		AuthUserFile /etc/apache2/passwords
		AuthGroupFile /etc/apache2/grupos
		Require group usuariosST
	</Directory>
</VirtualHost>
